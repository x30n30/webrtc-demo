<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC — Spatial Audio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    h1 { font-size: 1.2rem; letter-spacing: 0.1em; }
    .videos {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .tile span { font-size: 0.75rem; opacity: 0.6; }
    video {
      width: 480px;
      max-width: 100%;
      aspect-ratio: 16/9;
      background: #222;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .controls { display: flex; gap: 1rem; align-items: center; }
    button {
      padding: 0.5rem 1.5rem;
      background: #2a6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    button:disabled { background: #444; cursor: default; }
    #status { font-size: 0.85rem; opacity: 0.7; }
    .bottom {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .distance-ctrl {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 160px;
    }
    .distance-ctrl label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    .distance-ctrl input[type=range] { width: 100%; }
    canvas {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 50%;
    }
    canvas.room {
      border-radius: 4px;
    }
    video.local-border  { border: 2px solid #4af; }
    video.remote-border { border: 2px solid #f84; }
    .hint {
      font-size: 0.75rem;
      opacity: 0.4;
      text-align: center;
    }
    .file-player {
      border: 1px solid #444;
      border-radius: 6px;
      padding: 1rem 1.5rem;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .file-player h2 {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      opacity: 0.45;
      text-transform: uppercase;
    }
    #file-video {
      display: none;
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 4px;
    }
    #file-video.loaded { display: block; }
    .file-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    #file-status { font-size: 0.8rem; opacity: 0.5; margin-left: 0.5rem; }
    button.toggled { background: #a62; }

    /* ── Lobby ────────────────────────────────────────────────── */
    #lobby {
      position: fixed; inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .lobby-card {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 2rem 2.5rem;
      width: 380px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .lobby-card h1 { font-size: 1rem; letter-spacing: 0.12em; text-align: center; }
    .lobby-field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .lobby-field label { font-size: 0.75rem; opacity: 0.5; }
    .lobby-field input {
      background: #222;
      border: 1px solid #555;
      border-radius: 4px;
      color: #eee;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.4rem 0.6rem;
    }
    .lobby-field input:focus { outline: 1px solid #4af; border-color: #4af; }
    #lobby-room-status {
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.4em;
      opacity: 0.6;
    }
    #lobby-room-status.full { color: #f84; opacity: 1; }
    #lobby-room-status.open { color: #4af; opacity: 1; }
    #lobby-room-status.waiting { color: #fa4; opacity: 1; }
    .lobby-buttons { display: flex; gap: 0.6rem; }
    .lobby-buttons button { flex: 1; }
    button.secondary { background: #444; }
    button.secondary:hover { background: #555; }
    #lobby-msg { font-size: 0.78rem; color: #f84; text-align: center; min-height: 1.2em; }
  </style>
</head>
<body>

  <!-- ── Lobby ──────────────────────────────────────────────────────────── -->
  <div id="lobby">
    <div class="lobby-card">
      <h1>SPATIAL AUDIO CONFERENCE</h1>
      <div class="lobby-field">
        <label>Your name</label>
        <input id="lobby-name" type="text" placeholder="Enter your name" autocomplete="off" />
      </div>
      <div class="lobby-field">
        <label>Room</label>
        <input id="lobby-room" type="text" value="default" autocomplete="off" />
      </div>
      <div id="lobby-room-status">checking…</div>
      <div class="lobby-buttons">
        <button id="lobby-join-btn">Join Room</button>
        <button id="lobby-clear-btn" class="secondary">Clear Room</button>
      </div>
      <div id="lobby-msg"></div>
    </div>
  </div>

  <!-- ── App ────────────────────────────────────────────────────────────── -->
  <div id="app" style="display:none;width:100%;flex-direction:column;align-items:center;gap:1.5rem">
  <h1>WebRTC — Spatial Audio</h1>

  <div class="videos">
    <div class="tile">
      <video id="local-video" class="local-border" autoplay playsinline muted></video>
      <span style="color:#4af">You</span>
    </div>
    <div class="tile">
      <video id="remote-video" class="remote-border" autoplay playsinline muted></video>
      <span style="color:#f84" id="remote-name">Remote</span>
    </div>
  </div>

  <div class="controls">
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn" disabled>Disconnect</button>
    <span id="status">idle</span>
    <span id="ice-status" style="font-size:0.75rem;opacity:0.5"></span>
  </div>

  <!-- ── File Player ─────────────────────────────────────────────────── -->
  <div class="file-player">
    <h2>File Player — emulate remote participant</h2>
    <input type="file" id="file-input" accept="video/*" style="display:none" />
    <video id="file-video" controls></video>
    <div class="file-controls">
      <button id="file-choose-btn">Choose file</button>
      <button id="file-play-btn" disabled>Play</button>
      <button id="file-pause-btn" disabled>Pause</button>
      <button id="file-stop-btn" disabled>Stop</button>
      <button id="file-loop-btn" disabled>Loop: off</button>
      <button id="file-track-btn" disabled>Head track: off</button>
      <span id="file-status">no file</span>
    </div>
  </div>

  <div class="bottom">
    <div class="distance-ctrl">
      <label>
        <span>Distance</span>
        <span id="distance-val">1.0 m</span>
      </label>
      <input type="range" id="distance" min="1" max="10" value="1" step="0.1" />
    </div>
    <div class="tile">
      <canvas id="viz-mouse" width="200" height="200"></canvas>
      <span class="hint">mouse — active (M3)</span>
    </div>
    <div class="tile">
      <canvas id="viz-camera" width="200" height="200"></canvas>
      <span class="hint">you — <span id="face-status">no face</span></span>
    </div>
    <div class="tile">
      <canvas id="viz-remote" width="200" height="200"></canvas>
      <span class="hint">remote — <span id="remote-face-status">no face</span></span>
    </div>
    <div class="tile">
      <canvas id="room-viz" class="room" width="300" height="300"></canvas>
      <div class="distance-ctrl" style="width:300px;margin-top:0.4rem">
        <label>
          <span>Room size</span>
          <span id="room-size-val">10 m</span>
        </label>
        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.7rem;opacity:0.5">
          <span>5 m</span>
          <input type="range" id="room-size" min="5" max="30" value="10" step="1" style="flex:1" />
          <span>30 m</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MediaPipe FaceMesh (pinned version) -->
  </div><!-- /#app -->

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>
  <script src="spatial-audio.js"></script>
  <script src="landmark-to-yaw.js"></script>
  <script src="camera-head-tracker.js"></script>
  <script src="head-tracker.js"></script>
  <script src="spatial-viz.js"></script>
  <script src="room-viz.js"></script>
  <script src="webrtc.js"></script>
  <script>
    const localVideo    = document.getElementById('local-video');
    const remoteVideo   = document.getElementById('remote-video');
    const connectBtn    = document.getElementById('connect-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const statusEl      = document.getElementById('status');
    const iceStatusEl   = document.getElementById('ice-status');
    const distanceEl    = document.getElementById('distance');
    const distanceVal   = document.getElementById('distance-val');

    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsPort  = location.port || (location.protocol === 'https:' ? '443' : '80');
    const signalingUrl = `${wsProto}://${location.hostname || 'localhost'}:${wsPort}`;
    const room = location.hash.slice(1) || 'default';

    const spatialAudio   = new SpatialAudio();
    const mouseTracker   = new HeadTracker();
    const cameraTracker  = new CameraHeadTracker();
    const vizMouse       = new SpatialViz(document.getElementById('viz-mouse'));
    const vizCamera      = new SpatialViz(document.getElementById('viz-camera'));
    const vizRemote      = new SpatialViz(document.getElementById('viz-remote'));
    const roomViz        = new RoomViz(document.getElementById('room-viz'));

    roomViz.onPositionChange = (az, dist) => {
      spatialAudio.setSourcePosition(az, dist);
    };

    const roomSizeEl  = document.getElementById('room-size');
    const roomSizeVal = document.getElementById('room-size-val');
    roomSizeEl.addEventListener('input', () => {
      const m = parseInt(roomSizeEl.value, 10);
      roomSizeVal.textContent = `${m} m`;
      roomViz.setRoomSize(m);
    });

    let mouseAzimuth    = 0;
    let cameraAzimuth   = 0;
    let remoteAzimuth   = 0;
    let currentDistance = 1;

    // Mouse → vizMouse only (reference)
    mouseTracker.onHeadAngle = (az) => {
      mouseAzimuth = az;
      vizMouse.update(az, currentDistance);
    };
    mouseTracker.start(document.documentElement);

    // Local camera → vizCamera + spatial audio
    const faceStatusEl       = document.getElementById('face-status');
    const remoteFaceStatusEl = document.getElementById('remote-face-status');

    cameraTracker.onHeadAngle = (az) => {
      cameraAzimuth = az;
      vizCamera.update(az, currentDistance);
      faceStatusEl.textContent = `${Math.round(az)}°`;
      roomViz.setLocalAzimuth(az);
      // Send our angle to peer over data channel — before spatial audio so a
      // thrown audio error can never silently drop the data channel message.
      if (client) client.sendData({ azimuth: az });
      spatialAudio.setListenerOrientation(az);
    };

    // Distance slider affects all
    distanceEl.addEventListener('input', () => {
      currentDistance = parseFloat(distanceEl.value);
      distanceVal.textContent = `${currentDistance.toFixed(1)} m`;
      vizMouse.update(mouseAzimuth, currentDistance);
      vizCamera.update(cameraAzimuth, currentDistance);
      vizRemote.update(remoteAzimuth, currentDistance);
      spatialAudio.setSourcePosition(0, currentDistance);
    });

    // Initial draws
    vizMouse.update(0, 1);
    vizCamera.update(0, 1);
    vizRemote.update(0, 1);

    let client = null;
    let currentName = '';
    let currentRoom = location.hash.slice(1) || 'default';

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = 'connecting…';

      client = new WebRTCClient({
        signalingUrl,
        room: currentRoom,
        name: currentName,
        localVideoEl: localVideo,
        remoteVideoEl: remoteVideo,
        spatialAudio,
      });

      client.onIceStateChange = (state) => {
        const labels = { checking: 'ICE: checking…', connected: 'ICE: connected ✓',
                         completed: 'ICE: completed ✓', failed: 'ICE: failed ✗',
                         disconnected: 'ICE: disconnected', closed: '' };
        iceStatusEl.textContent = labels[state] || `ICE: ${state}`;
      };

      // Remote head angle arrives via data channel → drives vizRemote
      client.onDataMessage = ({ azimuth }) => {
        remoteAzimuth = azimuth;
        vizRemote.update(azimuth, currentDistance);
        remoteFaceStatusEl.textContent = `${Math.round(azimuth)}°`;
        roomViz.setRemoteAzimuth(azimuth);
      };

      client.onPeerName = (n) => {
        remoteNameEl.textContent = n || 'Remote';
      };

      client.onStatusChange = (s) => {
        statusEl.textContent = s;
        if (s === 'connected') {
          disconnectBtn.disabled = false;
        } else if (s === 'disconnected') {
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          cameraTracker.stop();
          faceStatusEl.textContent = 'no face';
          remoteFaceStatusEl.textContent = 'no face';
          iceStatusEl.textContent = '';
          remoteNameEl.textContent = 'Remote';
          showLobby();
        }
      };

      client.onError = (err) => {
        statusEl.textContent = `error: ${err.message}`;
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
      };

      try {
        await client.start();
        // Start camera tracking — awaited so model loads before loop begins
        faceStatusEl.textContent = 'loading…';
        await cameraTracker.start(localVideo);
        faceStatusEl.textContent = 'no face';
      } catch (err) {
        statusEl.textContent = `error: ${err.message}`;
        connectBtn.disabled = false;
      }
    });

    disconnectBtn.addEventListener('click', () => {
      if (client) { client.disconnect(); client = null; }
      cameraTracker.stop();
      spatialAudio.detach();
      fileAttached = false;
      remoteNameEl.textContent = 'Remote';
      showLobby();
    });

    // ── File Player ────────────────────────────────────────────────────────
    const fileInput     = document.getElementById('file-input');
    const fileVideo     = document.getElementById('file-video');
    const fileChooseBtn = document.getElementById('file-choose-btn');
    const filePlayBtn   = document.getElementById('file-play-btn');
    const filePauseBtn  = document.getElementById('file-pause-btn');
    const fileStopBtn   = document.getElementById('file-stop-btn');
    const fileLoopBtn   = document.getElementById('file-loop-btn');
    const fileTrackBtn  = document.getElementById('file-track-btn');
    const fileStatusEl  = document.getElementById('file-status');

    const fileTracker = new CameraHeadTracker();
    let fileAttached  = false;
    let fileTracking  = false;

    fileChooseBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;

      // Detach existing audio graph so a fresh MediaElementSource can be created
      if (fileAttached) {
        spatialAudio.detach();
        fileAttached = false;
      }
      fileTracker.stop();
      fileTracking = false;
      fileTrackBtn.textContent = 'Head track: off';
      fileTrackBtn.classList.remove('toggled');
      faceStatusEl.textContent = 'no face';

      if (fileVideo._objectUrl) URL.revokeObjectURL(fileVideo._objectUrl);
      fileVideo._objectUrl = URL.createObjectURL(file);
      fileVideo.src = fileVideo._objectUrl;
      fileVideo.classList.add('loaded');
      fileStatusEl.textContent = file.name;

      filePlayBtn.disabled  = false;
      filePauseBtn.disabled = true;
      fileStopBtn.disabled  = true;
      fileLoopBtn.disabled  = false;
      fileTrackBtn.disabled = false;
    });

    fileLoopBtn.addEventListener('click', () => {
      fileVideo.loop = !fileVideo.loop;
      fileLoopBtn.textContent = fileVideo.loop ? 'Loop: on' : 'Loop: off';
      fileLoopBtn.classList.toggle('toggled', fileVideo.loop);
    });

    filePlayBtn.addEventListener('click', async () => {
      if (!fileAttached) {
        spatialAudio.attachElement(fileVideo);
        fileAttached = true;
      }
      await fileVideo.play();
      fileStatusEl.textContent = 'playing';
      filePlayBtn.disabled  = true;
      filePauseBtn.disabled = false;
      fileStopBtn.disabled  = false;
    });

    filePauseBtn.addEventListener('click', () => {
      fileVideo.pause();
      fileStatusEl.textContent = 'paused';
      filePlayBtn.disabled  = false;
      filePauseBtn.disabled = true;
    });

    fileStopBtn.addEventListener('click', () => {
      fileVideo.pause();
      fileVideo.currentTime = 0;
      fileStatusEl.textContent = 'stopped';
      filePlayBtn.disabled  = false;
      filePauseBtn.disabled = true;
    });

    fileVideo.addEventListener('ended', () => {
      fileStatusEl.textContent = 'ended';
      filePlayBtn.disabled  = false;
      filePauseBtn.disabled = true;
    });

    // Head tracking toggle — reuses CameraHeadTracker on the file video element
    fileTrackBtn.addEventListener('click', async () => {
      if (!fileTracking) {
        faceStatusEl.textContent = 'loading…';
        await fileTracker.start(fileVideo);
        fileTracking = true;
        fileTrackBtn.textContent = 'Head track: on';
        fileTrackBtn.classList.add('toggled');
      } else {
        fileTracker.stop();
        fileTracking = false;
        fileTrackBtn.textContent = 'Head track: off';
        fileTrackBtn.classList.remove('toggled');
        faceStatusEl.textContent = 'no face';
      }
    });

    // File head angle → listener orientation (same path as webcam tracker)
    fileTracker.onHeadAngle = (az) => {
      cameraAzimuth = az;
      vizCamera.update(az, currentDistance);
      faceStatusEl.textContent = `${Math.round(az)}° (file)`;
      roomViz.setLocalAzimuth(az);
      spatialAudio.setListenerOrientation(az);
    };

    // Reset fileAttached when WebRTC takes over the audio graph
    connectBtn.addEventListener('click', () => { fileAttached = false; }, { capture: true });

    // ── Lobby ──────────────────────────────────────────────────────────────
    const lobbyEl       = document.getElementById('lobby');
    const appEl         = document.getElementById('app');
    const lobbyNameEl   = document.getElementById('lobby-name');
    const lobbyRoomEl   = document.getElementById('lobby-room');
    const lobbyStatusEl = document.getElementById('lobby-room-status');
    const lobbyJoinBtn  = document.getElementById('lobby-join-btn');
    const lobbyClearBtn = document.getElementById('lobby-clear-btn');
    const lobbyMsgEl    = document.getElementById('lobby-msg');
    const remoteNameEl  = document.getElementById('remote-name');

    let peekTimer = null;

    function getLobbyRoom() { return lobbyRoomEl.value.trim() || 'default'; }

    async function peekRoom() {
      const r = getLobbyRoom();
      return new Promise((resolve) => {
        const ws = new WebSocket(signalingUrl);
        const done = (result) => { try { ws.close(); } catch {} resolve(result); };
        ws.onopen    = () => ws.send(JSON.stringify({ type: 'peek', room: r }));
        ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'room-status') done(m); };
        ws.onerror   = () => done({ count: 0, names: [] });
        setTimeout(() => done({ count: 0, names: [] }), 3000);
      });
    }

    async function updateLobbyStatus() {
      const { count, names } = await peekRoom();
      if (count === 0) {
        lobbyStatusEl.className = 'open';
        lobbyStatusEl.textContent = "Room is empty — you'll be first";
      } else if (count === 1) {
        lobbyStatusEl.className = 'waiting';
        lobbyStatusEl.textContent = `1/2 — ${names[0]} is waiting`;
      } else {
        lobbyStatusEl.className = 'full';
        lobbyStatusEl.textContent = 'Room is full (2/2)';
      }
      lobbyJoinBtn.disabled = count >= 2;
    }

    function showLobby() {
      appEl.style.display   = 'none';
      lobbyEl.style.display = 'flex';
      lobbyMsgEl.textContent = '';
      updateLobbyStatus();
      peekTimer = setInterval(updateLobbyStatus, 3000);
    }

    function showApp() {
      clearInterval(peekTimer);
      lobbyEl.style.display = 'none';
      appEl.style.display   = 'flex';
    }

    lobbyRoomEl.addEventListener('input', () => {
      lobbyStatusEl.className = '';
      lobbyStatusEl.textContent = 'checking…';
      updateLobbyStatus();
    });

    lobbyJoinBtn.addEventListener('click', () => {
      const name = lobbyNameEl.value.trim();
      if (!name) { lobbyMsgEl.textContent = 'Please enter your name.'; return; }
      currentName = name;
      currentRoom = getLobbyRoom();
      showApp();
      connectBtn.click();
    });

    lobbyClearBtn.addEventListener('click', () => {
      const r = getLobbyRoom();
      const ws = new WebSocket(signalingUrl);
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'clear-room', room: r }));
        setTimeout(() => { try { ws.close(); } catch {} updateLobbyStatus(); }, 300);
      };
      lobbyMsgEl.textContent = `Room "${r}" cleared.`;
    });

    // Show lobby on load
    showLobby();
  </script>
</body>
</html>
